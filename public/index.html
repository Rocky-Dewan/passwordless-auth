<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureAuth — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #667eea;
      --c2: #764ba2;
      --c3: #f093fb;
      --c4: #4facfe;
      --card: rgba(255,255,255,0.92);
      --shadow: 0 25px 60px rgba(102,126,234,0.25), 0 8px 20px rgba(0,0,0,0.12);
      --radius: 20px;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: rgba(255,255,255,0.6);
      --input-bg: rgba(255,255,255,0.8);
      --input-border: #e2e8f0;
      --input-focus: #667eea;
      --success: #10b981;
      --error: #ef4444;
      --warning-bg: #fffbeb;
      --warning-border: #fbbf24;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 40%, #f093fb 70%, #4facfe 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      animation: blobFloat 6s ease-in-out infinite;
    }
    .blob-1 { width: 400px; height: 400px; background: #a78bfa; top: -100px; right: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #60a5fa; bottom: -80px; left: -80px; animation-delay: 2s; }
    .blob-3 { width: 250px; height: 250px; background: #f472b6; top: 50%; left: 20%; animation-delay: 4s; }
    @keyframes blobFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    /* Progress bar — sits ABOVE the card wrapper */
    #progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: rgba(255,255,255,0.2);
      z-index: 999;
      display: none;
    }
    #progress-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #10b981, #34d399, #fbbf24, #ef4444);
      background-size: 200% 100%;
      animation: barShimmer 2s linear infinite;
      transition: width 1s linear;
      border-radius: 0 3px 3px 0;
    }
    @keyframes barShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* Countdown ring shown inside OTP step */
    .countdown-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 18px 0 4px;
    }
    .countdown-ring-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 500;
    }
    #countdown-number {
      font-size: 15px;
      font-weight: 700;
      fill: var(--text);
    }
    #ring-circle {
      transition: stroke-dashoffset 1s linear;
      stroke: url(#ringGrad);
    }
    #ring-circle.expired { stroke: #ef4444; }

    /* Card */
    .card-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: cardEntrance 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 32px 70px rgba(102,126,234,0.3), 0 12px 28px rgba(0,0,0,0.15);
    }

    /* Header */
    .card-header {
      padding: 36px 32px 24px;
      text-align: center;
      background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.06));
      border-bottom: 1px solid rgba(102,126,234,0.12);
      position: relative;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
      50%       { box-shadow: 0 8px 32px rgba(102,126,234,0.65); }
    }

    .card-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-header p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Body */
    .card-body { padding: 28px 32px 32px; }
    .card-body.hidden { display: none; }

    /* Steps animation */
    .step-enter {
      animation: stepIn 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
    }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
      letter-spacing: 0.01em;
    }

    .input-wrap { position: relative; }
    .input-wrap svg.input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-group input[type="email"],
    .form-group input[type="text"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: var(--input-focus);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
    }
    .form-group input:focus + svg.input-icon,
    .input-wrap:focus-within svg.input-icon { color: var(--input-focus); }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s, background 0.2s;
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.5);
    }
    .btn-primary:hover:not(:disabled)::before { opacity: 1; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid #e5e7eb;
      font-weight: 600;
    }
    .btn-ghost:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #d1d5db;
      color: var(--text);
      transform: translateY(-1px);
    }

    .btn-link {
      background: none;
      border: none;
      color: #667eea;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s;
    }
    .btn-link:hover { color: #764ba2; }

    /* Alerts */
    .alert {
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      animation: alertPop 0.25s ease;
    }
    @keyframes alertPop {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .alert.hidden { display: none; }

    /* Success banner */
    .success-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(52,211,153,0.06));
      border: 1px solid rgba(16,185,129,0.25);
      color: #065f46;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* OTP boxes */
    .otp-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .otp-label-row label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .otp-input-row {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: center;
    }
    .otp-box {
      width: 42px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      font-family: 'Inter', monospace;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      caret-color: #667eea;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .otp-box:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
      transform: scale(1.05);
    }
    .otp-box.filled {
      border-color: #10b981;
      background: rgba(16,185,129,0.05);
    }
    .otp-dash {
      font-size: 22px;
      color: #cbd5e1;
      font-weight: 700;
      user-select: none;
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0 14px;
      color: #cbd5e1;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* Features strip */
    .features {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
      flex-wrap: wrap;
    }
    .feature-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 4px 10px;
    }

    @media (max-width: 480px) {
      .card-header, .card-body { padding-left: 20px; padding-right: 20px; }
      .otp-box { width: 36px; height: 46px; font-size: 18px; }
      .card-header h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Top progress bar (shown after email sent) -->
  <div id="progress-bar-wrap">
    <div id="progress-bar-fill"></div>
  </div>

  <!-- SVG gradient defs for ring -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#10b981"/>
        <stop offset="50%"  stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#ef4444"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="card-wrap">
    <div class="card">
      <div class="card-header">
        <div class="logo-wrap">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1>Secure Sign In</h1>
        <p>No password needed. Get a magic link + one-time code.</p>
      </div>

      <!-- Step 1: Email input -->
      <div id="step-email" class="card-body">
        <div id="error-msg" class="alert alert-error hidden">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-msg-text"></span>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="yourname@gmail.com"
              autocomplete="email"
              autofocus
            />
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>

        <button id="btn-request" class="btn btn-primary" onclick="requestLogin()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span id="btn-text">Send login link</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>

        <div class="features">
          <span class="feature-pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            No password
          </span>
          <span class="feature-pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Expires in 250s
          </span>
          <span class="feature-pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            End-to-end secure
          </span>
        </div>
      </div>

      <!-- Step 2: OTP verification -->
      <div id="step-otp" class="card-body hidden">
        <div class="success-banner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Email sent to <strong id="sent-email"></strong></span>
        </div>

        <p class="hint">Click the magic link in your inbox, or type the 8-digit code here.</p>

        <div id="otp-error" class="alert alert-error hidden">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="otp-error-text"></span>
        </div>

        <div class="form-group">
          <div class="otp-label-row">
            <label>8-digit code</label>
          </div>
          <div class="otp-input-row" id="otp-boxes">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <span class="otp-dash">—</span>
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
          </div>
        </div>

        <!-- Countdown ring -->
        <div class="countdown-ring-wrap">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="30" fill="none" stroke="#e2e8f0" stroke-width="5"/>
            <circle id="ring-circle" cx="36" cy="36" r="30" fill="none"
              stroke-width="5"
              stroke-linecap="round"
              stroke-dasharray="188.5"
              stroke-dashoffset="0"
              transform="rotate(-90 36 36)"
            />
            <text id="countdown-number" x="36" y="41" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#1a1a2e">250</text>
          </svg>
          <div class="countdown-ring-label" id="countdown-label">seconds remaining</div>
        </div>

        <button id="btn-verify" class="btn btn-primary" onclick="verifyOtp()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="verify-text">Verify code</span>
          <span id="verify-spinner" class="spinner hidden"></span>
        </button>

        <button class="btn btn-ghost" onclick="resetToEmail()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Use a different email
        </button>

        <div id="resend-row" class="hidden" style="text-align:center;margin-top:8px;">
          <button class="btn-link" onclick="requestLogin()">Resend login link</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
