<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SecureAuth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 40%, #f093fb 70%, #4facfe 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; pointer-events: none; animation: blobFloat 6s ease-in-out infinite; }
    .blob-1 { width: 400px; height: 400px; background: #a78bfa; top: -100px; right: -100px; }
    .blob-2 { width: 300px; height: 300px; background: #60a5fa; bottom: -80px; left: -80px; animation-delay: 2s; }
    @keyframes blobFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(102,126,234,0.25), 0 8px 20px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(30px) scale(0.96); } to { opacity:1; transform: none; } }

    .card-header {
      padding: 36px 32px 24px;
      text-align: center;
      background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.06));
      border-bottom: 1px solid rgba(102,126,234,0.12);
    }
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
    }
    .card-header h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .card-header p { color: #6b7280; font-size: 14px; }

    .card-body { padding: 28px 32px 32px; }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(102,126,234,0.06), rgba(118,75,162,0.04));
      border: 1px solid rgba(102,126,234,0.15);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
    .user-status {
      font-size: 12px; color: #10b981; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .success-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(52,211,153,0.06));
      border: 1px solid rgba(16,185,129,0.25);
      color: #065f46;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 15px rgba(239,68,68,0.35);
    }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(239,68,68,0.45); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="card-header">
      <div class="logo-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p>You are authenticated securely.</p>
    </div>
    <div class="card-body">
      <div class="user-badge">
        <div class="avatar" id="avatar-letter">?</div>
        <div class="user-info">
          <div class="user-name" id="user-email">Loading...</div>
          <div class="user-status">
            <div class="status-dot"></div>
            Signed in
          </div>
        </div>
      </div>
      <div class="success-banner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Passwordless login successful.
      </div>
      <button class="btn btn-danger" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </div>

  <script>
    async function loadUser() {
      try {
        const res = await fetch('/auth/me', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/'; return; }
        const { user } = await res.json();
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('avatar-letter').textContent = user.email[0].toUpperCase();
      } catch { window.location.href = '/'; }
    }

    async function logout() {
      try {
        const csrfRes = await fetch('/auth/csrf-token', { credentials: 'include' });
        const { csrfToken } = await csrfRes.json();
        await fetch('/auth/logout', {
          method: 'POST',
          credentials: 'include',
          headers: { 'x-csrf-token': csrfToken },
        });
      } catch {}
      window.location.href = '/';
    }

    loadUser();
  </script>
</body>
</html>
