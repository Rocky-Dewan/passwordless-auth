<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureAuth — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #667eea; --c2: #764ba2; --c3: #f093fb; --c4: #4facfe;
      --text: #1a1a2e; --muted: #6b7280; --hint: #9ca3af;
      --border: #e5e7eb; --input-border: #d1d5db;
      --error-bg: #fef2f2; --error-border: #fca5a5; --error-text: #991b1b;
      --success-bg: #f0fdf4; --success-border: #86efac; --success-text: #065f46;
      --radius: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 35%, #9b59b6 60%, #4facfe 100%);
      background-size: 400% 400%;
      animation: bgShift 10s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes bgShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* Floating blobs */
    .blob { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.25; pointer-events: none; }
    .blob-1 { width: 450px; height: 450px; background: #a78bfa; top: -120px; right: -120px; animation: bfloat 7s ease-in-out infinite; }
    .blob-2 { width: 350px; height: 350px; background: #60a5fa; bottom: -100px; left: -100px; animation: bfloat 9s ease-in-out infinite reverse; }
    .blob-3 { width: 280px; height: 280px; background: #f472b6; top: 45%; left: 15%; animation: bfloat 11s ease-in-out infinite 2s; }
    @keyframes bfloat { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-24px) scale(1.04); } }

    /* ── Progress bar ── */
    #progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,0.2);
      z-index: 1000;
      display: none;
    }
    #progress-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #10b981 0%, #34d399 30%, #fbbf24 65%, #ef4444 100%);
      background-size: 300% 100%;
      animation: barShimmer 3s linear infinite;
      border-radius: 0 2px 2px 0;
      transform-origin: left;
    }
    @keyframes barShimmer { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

    /* ── Card ── */
    .card-wrap { position: relative; z-index: 10; width: 100%; max-width: 420px; }

    .card {
      background: rgba(255,255,255,0.93);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: var(--radius);
      box-shadow: 0 24px 60px rgba(102,126,234,0.22), 0 8px 24px rgba(0,0,0,0.12);
      overflow: hidden;
      animation: cardIn 0.5s cubic-bezier(0.34,1.5,0.64,1) both;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 32px 70px rgba(102,126,234,0.28), 0 10px 28px rgba(0,0,0,0.14); }
    @keyframes cardIn { from { opacity:0; transform: translateY(28px) scale(0.96); } to { opacity:1; transform: none; } }

    /* ── Header ── */
    .card-header {
      padding: 34px 32px 22px;
      text-align: center;
      background: linear-gradient(135deg, rgba(102,126,234,0.07), rgba(118,75,162,0.05));
      border-bottom: 1px solid rgba(102,126,234,0.1);
    }
    .logo-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 62px; height: 62px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 17px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(102,126,234,0.42);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse { 0%,100% { box-shadow: 0 8px 24px rgba(102,126,234,0.42); } 50% { box-shadow: 0 8px 32px rgba(102,126,234,0.65); } }
    .card-header h1 {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 5px;
    }
    .card-header p { color: var(--muted); font-size: 14px; line-height: 1.5; }

    /* ── Body ── */
    .card-body { padding: 26px 32px 30px; }
    .card-body.hidden { display: none !important; }
    .step-enter { animation: stepIn 0.3s cubic-bezier(0.34,1.4,0.64,1) both; }
    @keyframes stepIn { from { opacity:0; transform: translateX(18px); } to { opacity:1; transform: none; } }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; transition: color 0.2s; }
    .input-wrap:focus-within svg { color: #667eea; }
    .form-group input[type="email"] {
      width: 100%; padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--input-border); border-radius: 11px;
      font-size: 15px; font-family: inherit; color: var(--text);
      background: rgba(255,255,255,0.85); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: #667eea; background: #fff;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
    }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 20px;
      border-radius: 11px; font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none; margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 14px rgba(102,126,234,0.38);
      position: relative; overflow: hidden;
    }
    .btn-primary::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.48); }
    .btn-primary:hover:not(:disabled)::after { opacity: 1; }

    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1.5px solid var(--border); font-weight: 600;
    }
    .btn-ghost:hover:not(:disabled) { background: #f9fafb; border-color: #d1d5db; color: var(--text); transform: translateY(-1px); }

    .btn-link {
      background: none; border: none; color: #667eea;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; text-decoration: underline; text-underline-offset: 2px;
      padding: 0; transition: color 0.2s;
    }
    .btn-link:hover { color: #764ba2; }

    /* ── Alerts ── */
    .alert {
      border-radius: 10px; padding: 10px 13px; font-size: 13px;
      margin-bottom: 14px; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 8px;
      animation: alertPop 0.2s ease;
    }
    @keyframes alertPop { from { opacity:0; transform: scale(0.97); } to { opacity:1; transform: none; } }
    .alert-error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .alert.hidden { display: none !important; }

    .success-banner {
      display: flex; align-items: center; gap: 10px;
      background: var(--success-bg); border: 1px solid var(--success-border);
      color: var(--success-text); border-radius: 11px;
      padding: 11px 14px; font-size: 13px; font-weight: 500; margin-bottom: 18px;
    }

    .hint { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }

    /* ── OTP boxes ── */
    .otp-input-row { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .otp-box {
      width: 42px; height: 52px; text-align: center;
      font-size: 22px; font-weight: 800; font-family: 'Inter', monospace;
      border: 2px solid #e2e8f0; border-radius: 11px;
      outline: none; background: rgba(255,255,255,0.88); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      caret-color: #667eea;
    }
    .otp-box:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.14); transform: scale(1.06); }
    .otp-box.filled { border-color: #10b981; background: rgba(16,185,129,0.05); }
    .otp-dash { font-size: 20px; color: #cbd5e1; font-weight: 700; user-select: none; }

    /* ── Countdown ring ── */
    .ring-wrap { display: flex; flex-direction: column; align-items: center; margin: 16px 0 6px; }
    #ring-circle { transition: stroke-dashoffset 1s linear; }
    #ring-circle.expiring { stroke: url(#ringWarn) !important; }
    #ring-circle.expired  { stroke: #ef4444 !important; }
    .ring-label { font-size: 12px; color: var(--muted); margin-top: 5px; font-weight: 500; }

    /* ── Features strip ── */
    .features { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 18px; padding-top: 18px; border-top: 1px solid #f1f5f9; }
    .pill { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: #6b7280; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 4px 10px; }

    /* ── Spinner ── */
    .spinner { width: 17px; height: 17px; border: 2.5px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.65s linear infinite; flex-shrink: 0; }
    .spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 460px) {
      .card-header, .card-body { padding-left: 18px; padding-right: 18px; }
      .otp-box { width: 36px; height: 46px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Top countdown bar (appears after email sent) -->
  <div id="progress-bar-wrap">
    <div id="progress-bar-fill"></div>
  </div>

  <!-- SVG gradient defs for ring -->
  <svg width="0" height="0" style="position:absolute;pointer-events:none">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#10b981"/>
        <stop offset="60%"  stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#ef4444"/>
      </linearGradient>
      <linearGradient id="ringWarn" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#ef4444"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="card-wrap">
    <div class="card">

      <div class="card-header">
        <div class="logo-wrap">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1>Secure Sign In</h1>
        <p>No password needed. Get a magic link + one-time code.</p>
      </div>

      <!-- Step 1: Email -->
      <div id="step-email" class="card-body">
        <div id="error-msg" class="alert alert-error hidden">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-msg-text"></span>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <input
              type="email" id="email" name="email"
              placeholder="yourname@gmail.com"
              autocomplete="email" autofocus
            />
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>

        <button id="btn-request" class="btn btn-primary" onclick="requestLogin()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span id="btn-text">Send login link</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>

        <div class="features">
          <span class="pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            No password
          </span>
          <span class="pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Expires in 250s
          </span>
          <span class="pill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            End-to-end secure
          </span>
        </div>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-otp" class="card-body hidden">
        <div class="success-banner">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Email sent to <strong id="sent-email"></strong></span>
        </div>

        <p class="hint">Click the magic link in your inbox, or type the 8-digit code below.</p>

        <div id="otp-error" class="alert alert-error hidden">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="otp-error-text"></span>
        </div>

        <div class="form-group">
          <label>8-digit code</label>
          <div class="otp-input-row">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <span class="otp-dash">—</span>
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
            <input type="text" maxlength="1" class="otp-box" inputmode="numeric" pattern="[0-9]">
          </div>
        </div>

        <!-- Countdown ring -->
        <div class="ring-wrap">
          <svg width="74" height="74" viewBox="0 0 74 74">
            <circle cx="37" cy="37" r="31" fill="none" stroke="#e2e8f0" stroke-width="5"/>
            <circle id="ring-circle" cx="37" cy="37" r="31" fill="none"
              stroke="url(#ringGrad)"
              stroke-width="5"
              stroke-linecap="round"
              stroke-dasharray="194.8"
              stroke-dashoffset="0"
              transform="rotate(-90 37 37)"
            />
            <text id="countdown-number" x="37" y="43" text-anchor="middle"
              font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#1a1a2e">250</text>
          </svg>
          <div class="ring-label" id="countdown-label">seconds remaining</div>
        </div>

        <button id="btn-verify" class="btn btn-primary" onclick="verifyOtp()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="verify-text">Verify code</span>
          <span id="verify-spinner" class="spinner hidden"></span>
        </button>

        <button class="btn btn-ghost" onclick="resetToEmail()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Use a different email
        </button>

        <div id="resend-row" class="hidden" style="text-align:center;margin-top:6px;">
          <button class="btn-link" onclick="resetToEmail();setTimeout(requestLogin,100)">Resend login link</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
