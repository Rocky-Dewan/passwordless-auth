version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: auth_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: passwordless_auth_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../scripts/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth_user -d passwordless_auth_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: passwordless_auth_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      BASE_URL: http://localhost:3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      DB_NAME: passwordless_auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret_please_change_in_production_must_be_64_chars_min
      CSRF_SECRET: dev_csrf_secret_please_change_in_production_long_random_string
      # ── Brevo email — fill in your credentials ──
      EMAIL_HOST: smtp-relay.brevo.com
      EMAIL_PORT: '587'
      EMAIL_SECURE: 'false'
      EMAIL_USER: ''
      EMAIL_PASS: ''
      EMAIL_FROM: ''
    ports:
      - '3000:3000'
    volumes:
      - ..:/app
      - /app/node_modules

volumes:
  pg_data:
  redis_data:
